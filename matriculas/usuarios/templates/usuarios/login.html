<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="text-center mb-4">
                        Iniciar sesión
                    </h2>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label>
                                Usuario
                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                            >

                        </div>

                        <div class="mb-3">

                            <label>
                                Contraseña
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                            >

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Ingresar

                        </button>

                    </form>

                    <p class="text-danger mt-3">
                        {{ mensaje }}
                    </p>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
